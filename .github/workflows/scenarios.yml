name: scenarios

# L5 behavioral scenarios run against the real Anthropic API and bill
# real inference tokens. The workflow is gated to manual + weekly cron
# (one hour after live.yml on Mondays at 04:00 UTC) so PRs never trigger it.
on:
  workflow_dispatch:
    inputs:
      sweep_only:
        description: "If true, only run the sweeper (skip scenarios)"
        type: boolean
        default: false
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: read

jobs:
  scenarios:
    name: behavioral scenarios + sweep
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      TF_ACC: "1"
      TF_ACC_LIVE: "1"
      TF_ACC_SCENARIOS: "1"
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: "1.11.*"
          terraform_wrapper: false
      - run: go mod download

      - name: Pre-run sweep (clear orphans older than 1h)
        run: |
          go test ./internal/provider/... \
            -v \
            -sweep=anthropic \
            -sweep-run=claude-managed-agents_agent,claude-managed-agents_environment,claude-managed-agents_memory_store,claude-managed-agents_vault,claude-managed-agents_skill \
            -timeout 10m

      - name: Scenarios
        if: ${{ !inputs.sweep_only }}
        run: |
          go test ./internal/scenarios/... \
            -count=1 \
            -timeout 50m \
            -v

      - name: Post-run sweep (best-effort cleanup)
        if: always() && !inputs.sweep_only
        run: |
          go test ./internal/provider/... \
            -v \
            -sweep=anthropic \
            -sweep-run=claude-managed-agents_agent,claude-managed-agents_environment,claude-managed-agents_memory_store,claude-managed-agents_vault,claude-managed-agents_skill \
            -sweep-allow-failures \
            -timeout 10m
