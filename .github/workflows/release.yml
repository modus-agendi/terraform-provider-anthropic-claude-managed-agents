name: release

on:
  push:
    tags:
      - "v*"

# Default permissions are read-only; the release job below upgrades to write.
permissions:
  contents: read

jobs:
  # Hard gate: live acceptance must pass before goreleaser publishes.
  # If a divergence has appeared between the fake L2 fixture and the real
  # Anthropic API since the last weekly run, this catches it before the
  # release ships. To bypass for a hotfix, dispatch the release manually
  # after temporarily removing `needs: live`.
  live:
    name: pre-release live acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Live job only runs tests; never writes to the repo.
    permissions:
      contents: read
    env:
      TF_ACC: "1"
      TF_ACC_LIVE: "1"
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: "1.11.*"
          terraform_wrapper: false
      - run: go mod download
      - name: Pre-run sweep
        run: |
          go test ./internal/provider/... \
            -v \
            -sweep=anthropic \
            -sweep-run=claude-managed-agents_agent \
            -timeout 10m
      - name: Live acceptance tests
        run: |
          go test ./internal/provider/... \
            -count=1 \
            -timeout 25m
      - name: Post-run sweep
        if: always()
        run: |
          go test ./internal/provider/... \
            -v \
            -sweep=anthropic \
            -sweep-run=claude-managed-agents_agent \
            -sweep-allow-failures \
            -timeout 10m

  release:
    needs: live
    runs-on: ubuntu-latest
    # Goreleaser creates the GitHub Release and uploads signed artifacts.
    permissions:
      contents: write
    outputs:
      # Base64-encoded list of `<sha256>  <filename>` lines for every
      # release artifact. Consumed by the SLSA provenance generator below.
      hashes: ${{ steps.hashes.outputs.hashes }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@e89d40939c28e39f97cf32126055eeae86ba74ec # v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
      - name: Compute artifact digests for SLSA provenance
        id: hashes
        run: |
          # Goreleaser already produced dist/*_SHA256SUMS in the right
          # format (one `<sha256>  <filename>` line per artifact).
          # Base64-encode the file so the reusable workflow can ingest it.
          checksum_file=$(find dist -name '*_SHA256SUMS' | head -n1)
          if [ -z "$checksum_file" ]; then
            echo "no SHA256SUMS file found under dist/" >&2
            exit 1
          fi
          echo "hashes=$(base64 -w0 < "$checksum_file")" >> "$GITHUB_OUTPUT"

  # SLSA L3 provenance — attests the workflow that produced each release
  # artifact. Consumers verify with `slsa-verifier verify-artifact`. Uses
  # the dedicated reusable workflow which runs in an isolated job that the
  # release job cannot tamper with.
  #
  # `private-repository: true` is set because the generator's repo-visibility
  # detection mis-reads this public repo as private and aborts. The flag's
  # only effect is acknowledging that the repo name will appear in the
  # Sigstore public transparency log — fine here, the repo IS public.
  provenance:
    needs: release
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@5a775b367a56d5bd118a224a811bba288150a563 # v2.0.0
    with:
      base64-subjects: ${{ needs.release.outputs.hashes }}
      upload-assets: true
      private-repository: true
