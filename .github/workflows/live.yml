name: live

on:
  workflow_dispatch:
    inputs:
      sweep_only:
        description: "If true, only run the sweeper (do not run live tests)"
        type: boolean
        default: false
  # Weekly drift detection. Runs Monday 03:00 UTC. The pre/post sweeper
  # cleans up resources older than 1h with the tf-acc-test- prefix, so
  # the cost is bounded.
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read

jobs:
  live:
    name: live acceptance + sweep
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TF_ACC: "1"
      TF_ACC_LIVE: "1"
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.10.*"
          terraform_wrapper: false
      - run: go mod download

      - name: Pre-run sweep (clear orphans older than 1h)
        run: |
          go test ./internal/provider/... \
            -v \
            -sweep=anthropic \
            -sweep-run=claude-managed-agents_agent \
            -timeout 10m

      - name: Live acceptance tests
        if: ${{ !inputs.sweep_only }}
        run: |
          go test ./internal/provider/... \
            -count=1 \
            -timeout 25m

      - name: Post-run sweep (best-effort cleanup)
        if: always() && !inputs.sweep_only
        run: |
          go test ./internal/provider/... \
            -v \
            -sweep=anthropic \
            -sweep-run=claude-managed-agents_agent \
            -sweep-allow-failures \
            -timeout 10m
