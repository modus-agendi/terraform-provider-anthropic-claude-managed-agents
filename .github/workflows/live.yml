name: live

on:
  workflow_dispatch:
    inputs:
      sweep_only:
        description: "If true, only run the sweeper (do not run live tests)"
        type: boolean
        default: false
  # Nightly drift detection. Runs at 03:00 UTC every day to surface
  # divergences between the L2 fake API fixture and the real Anthropic
  # API as soon as they appear, rather than waiting for the next release.
  # The pre/post sweeper cleans up resources older than 1h with the
  # tf-acc-test- prefix, so cost stays bounded even on consecutive runs.
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read

jobs:
  live:
    name: live acceptance + sweep
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TF_ACC: "1"
      TF_ACC_LIVE: "1"
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          # Live runs on the documented minimum (1.11 introduced write-only
          # attributes used by claude-managed-agents_vault_credential).
          terraform_version: "1.11.*"
          terraform_wrapper: false
      - run: go mod download

      - name: Pre-run sweep (clear orphans older than 1h)
        run: |
          go test ./internal/provider/... \
            -v \
            -sweep=anthropic \
            -sweep-run=claude-managed-agents_agent \
            -timeout 10m

      - name: Live acceptance tests
        if: ${{ !inputs.sweep_only }}
        run: |
          go test ./internal/provider/... \
            -count=1 \
            -timeout 25m

      - name: Post-run sweep (best-effort cleanup)
        if: always() && !inputs.sweep_only
        run: |
          go test ./internal/provider/... \
            -v \
            -sweep=anthropic \
            -sweep-run=claude-managed-agents_agent \
            -sweep-allow-failures \
            -timeout 10m
