name: Claude Code

# Reacts to @claude mentions in issues — and nothing else. Every run is
# gated on the maintainer's account in the workflow condition itself, so
# nobody else can start runs that draw on the Claude subscription. There is
# deliberately no PR-triggered Claude workflow: automated implementation
# work is handled by claude-issue.yml (label-gated, same actor pin).
on:
  issues:
    types: [opened, assigned]
  issue_comment:
    types: [created]

# Default to no permissions; the job grants its own minimal set.
permissions: {}

jobs:
  claude:
    # github.actor is the account whose action fired the event (issue author
    # or commenter). Pinning it to the maintainer ignores mentions from
    # anyone else before any billable work starts — independent of the
    # action's own write-permission check. The !issue.pull_request guard
    # keeps PR comment threads out (issue_comment fires for those too).
    if: |
      github.actor == 'andasv' &&
      !github.event.issue.pull_request &&
      (
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude'))) ||
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: read
      id-token: write # OIDC exchange for the Claude GitHub App token
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@0cb4f3e5e764d2e00407d29b6bf0aa9df0976d88 # v1.0.146
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Full transcript in the job log (public on a public repo).
          show_full_output: true
          # Q&A mentions don't need Opus; sonnet burns far less of the
          # subscription usage window. Implementation runs (claude-issue.yml)
          # use opus.
          claude_args: |
            --model sonnet
