name: test

on:
  pull_request:
    paths-ignore:
      - "README.md"
      - "CHANGELOG.md"
      - "CONTRIBUTING.md"
      - "docs/**"
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "CHANGELOG.md"
      - "CONTRIBUTING.md"
      - "docs/**"

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go mod download
      - run: go build -v ./...

  lint:
    name: lint
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.0

  unit:
    name: unit tests
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: |
          go test -race \
            -coverprofile=coverage-unit.out \
            -coverpkg=./internal/client/... \
            ./internal/client/... \
            -count=1 \
            -timeout 5m
      - uses: codecov/codecov-action@v4
        with:
          files: ./coverage-unit.out
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  acceptance:
    name: acceptance (httptest)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        terraform:
          - "1.8.*"
          - "1.9.*"
          - "1.10.*"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ matrix.terraform }}
          terraform_wrapper: false
      - run: go mod download
      - env:
          TF_ACC: "1"
        run: |
          go test \
            -coverprofile=coverage-acc.out \
            -coverpkg=./internal/... \
            ./internal/provider/... \
            -count=1 \
            -timeout 30m
      - uses: codecov/codecov-action@v4
        if: matrix.terraform == '1.10.*'
        with:
          files: ./coverage-acc.out
          flags: acceptance
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  docs:
    name: docs are committed
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go generate ./...
      - name: Verify docs/ is clean
        run: |
          if ! git diff --exit-code -- docs/; then
            echo "::error::docs/ is out of date. Run 'make docs' and commit the result."
            exit 1
          fi
      - name: Validate doc structure (tfproviderdocs)
        run: |
          go run github.com/bflad/tfproviderdocs check \
            -provider-name claude-managed-agents \
            ./
